<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALBUNYAN · Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #1e1e1e;
            /* slightly lighter than original */
            color: #e2e2e2;
            line-height: 1.5;
        }

        :root {
            --dark-gray: #2f2f2f;
            --steel-blue: #3d7eb0;
            /* brighter, cleaner blue */
            --safety-orange: #f4a94e;
            /* warmer, softer orange */
            --safety-orange-dark: #e68a2e;
            /* deeper hover */
            --bg-light: #2c2c2c;
            /* unified card background */
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* header (identical to index) */
        .top-header {
            background-color: #1e1e1e;
            border-bottom: 3px solid var(--safety-orange);
            padding: 0.7rem 0;
        }

        .header-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            direction: ltr;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .company-name h1 {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.3;
            color: white;
        }

        .company-name .ar-name {
            color: var(--safety-orange);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .lang-switcher {
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid #555;
            color: #ccc;
            padding: 0.3rem 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .lang-btn:hover {
            background: var(--steel-blue);
            color: white;
            border-color: var(--steel-blue);
        }

        .lang-btn.active {
            background: var(--safety-orange);
            color: #1a1a1a;
            border-color: var(--safety-orange);
        }

        nav {
            background-color: #252525;
            border-bottom: 1px solid #3a3a3a;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            padding: 0.8rem 0;
        }

        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover {
            color: var(--safety-orange);
            border-bottom-color: var(--safety-orange);
        }

        /* gallery specific */
        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 2.5rem 0 1rem;
            border-left: 6px solid var(--safety-orange);
            padding-left: 1rem;
        }

        .page-title span {
            color: var(--safety-orange);
            font-size: 1.8rem;
            font-weight: 500;
            display: block;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0 3rem;
        }

        .gallery-item {
            position: relative;
            background: #2c2c2c;
            /* unified card background */
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border-bottom: 3px solid var(--steel-blue);
            transition: transform 0.2s, border-color 0.2s;
            aspect-ratio: 4/3;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            border-bottom-color: var(--safety-orange);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 80vh;
            border: 3px solid var(--safety-orange);
            border-radius: 4px;
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 3rem;
            color: white;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 1010;
        }

        .lightbox-close:hover {
            color: var(--safety-orange);
        }

        /* footer */
        footer {
            background-color: #181818;
            border-top: 2px solid var(--steel-blue);
            padding: 2rem 0;
            margin-top: 3rem;
        }

        .copyright {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .header-row {
                flex-direction: column;
                align-items: start;
                gap: 1rem;
            }

            .nav-links {
                flex-wrap: wrap;
                gap: 1rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .page-title span {
                font-size: 1.4rem;
            }
        }

        /* arabic text direction handling */
        [data-dir="rtl"] {
            direction: rtl;
            text-align: right;
        }

        [data-dir="ltr"] {
            direction: ltr;
            text-align: left;
        }

        .header-row {
            direction: ltr !important;
        }

        .company-logo {
            height: 4rem;
        }
    </style>
</head>

<body>
    <!-- header -->
    <div class="top-header">
        <div class="container header-row">
            <div class="logo-area">
                <img src="albuyan-logo.png" alt="company-logo" class="company-logo">
                <div class="company-name">
                    <h1 id="companyNameEn">ALBUNYAN For manufacturing of aluminum Doors, windows and curtain walls.LLC
                    </h1>
                    <div class="ar-name" id="companyNameAr" data-dir="rtl">شركة البنيان لصناعة أبواب ونوافذ وواجهات
                        الألومنيوم ذ.م.م</div>
                </div>
            </div>
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ar">العربية</button>
                <button class="lang-btn" data-lang="zh">中文</button>
            </div>
        </div>
    </div>

    <nav>
        <div class="container">
            <ul class="nav-links">
                <li><a href="index.html" data-i18n="navHome">Home</a></li>
                <li><a href="gallery.html" data-i18n="navGallery">Gallery</a></li>
                <li><a href="contact.html" data-i18n="navContact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- main gallery content -->
    <div class="container">
        <h1 class="page-title">
            <span data-i18n="galleryTitleEn">Gallery</span>
            <span data-i18n="galleryTitleAr" data-dir="rtl">معرض الأعمال</span>
        </h1>

        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <!-- lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <img class="lightbox-img" id="lightboxImg" src="" alt="">
    </div>

    <!-- footer (only copyright) -->
    <footer>
        <div class="container copyright" data-i18n="copyright">© 2016, albunyan.ly All Rights Reserved.</div>
    </footer>

    <script>
        (function () {
            // ---------- ROBUST QUERY PARAMETER HELPER ----------
            function addOrUpdateQueryParam(href, key, value) {
                if (!href) return href;
                const hashIndex = href.indexOf('#');
                const hash = hashIndex >= 0 ? href.slice(hashIndex) : '';
                const base = hashIndex >= 0 ? href.slice(0, hashIndex) : href;

                const queryIndex = base.indexOf('?');
                if (queryIndex >= 0) {
                    const basePath = base.slice(0, queryIndex);
                    const queryString = base.slice(queryIndex + 1);
                    const params = new URLSearchParams(queryString);
                    params.set(key, value);
                    return basePath + '?' + params.toString() + hash;
                } else {
                    return base + '?' + key + '=' + encodeURIComponent(value) + hash;
                }
            }

            // ---------- READ LANGUAGE FROM URL ----------
            const urlParams = new URLSearchParams(window.location.search);
            const initialLang = urlParams.get('lang') || 'en';

            // ---------- GALLERY IMAGES ----------
            const galleryImages = [
                { url: 'assets/1.jpg', alt: 'A' },
                { url: 'assets/2.jpeg', alt: 'B' },
                { url: 'assets/3.jpg', alt: 'C' },
                { url: 'assets/4.jpg', alt: 'D' },
                { url: 'assets/5.webp', alt: 'A' },
                { url: 'assets/6.avif', alt: 'B' },
                { url: 'assets/7.jpg', alt: 'C' },
                { url: 'assets/8.jpg', alt: 'D' },
                { url: 'assets/9.jpeg', alt: 'B' },
                { url: 'assets/10.webp', alt: 'C' },
                { url: 'assets/11.webp', alt: 'D' },
                { url: 'assets/12.webp', alt: 'A' }
            ];

            const grid = document.getElementById('galleryGrid');
            function renderGallery() {
                grid.innerHTML = '';
                galleryImages.forEach((img, index) => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.setAttribute('data-index', index);
                    const image = document.createElement('img');
                    image.src = img.url;
                    image.alt = img.alt;
                    image.loading = 'lazy';
                    item.appendChild(image);
                    item.addEventListener('click', () => openLightbox(index));
                    grid.appendChild(item);
                });
            }
            renderGallery();

            // ---------- LIGHTBOX ----------
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const lightboxClose = document.getElementById('lightboxClose');

            function openLightbox(index) {
                lightboxImg.src = galleryImages[index].url;
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            }

            lightboxClose.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                    closeLightbox();
                }
            });

            // ---------- TRANSLATIONS (with full RTL support) ----------
            const translations = {
                en: {
                    navHome: 'Home',
                    navGallery: 'Gallery',
                    navContact: 'Contact',
                    companyNameEn: "Al Bunyan Factory for Prefabricated Buildings and Steel Structures",
                    companyNameAr: "Integrated Solutions for Prefab Buildings & Steel Structures",
                    galleryTitleEn: 'Gallery',
                    galleryTitleAr: 'Gallery',
                    copyright: '© 2016, albunyan.ly All Rights Reserved.'
                },
                ar: {
                    navHome: 'الرئيسية',
                    navGallery: 'معرض الأعمال',
                    navContact: 'اتصل بنا',
                    companyNameEn: 'مصنع البنيان لصناعة المباني الجاهزة والهياكل الفولاذية',
                    companyNameAr: 'حلول متكاملة للمباني الجاهزة والهياكل الفولاذية',
                    galleryTitleEn: 'Gallery',
                    galleryTitleAr: 'معرض الأعمال',
                    copyright: '© 2016، albunyan.ly جميع الحقوق محفوظة.'
                },
                zh: {
                    navHome: '首页',
                    navGallery: '画廊',
                    navContact: '联系我们',
                    companyNameEn: "阿尔布延预制建筑和钢结构工厂",
                    companyNameAr: "预制建筑与钢结构综合解决方案",
                    galleryTitleEn: '画廊',
                    galleryTitleAr: '作品画廊',
                    copyright: '© 2016, albunyan.ly 版权所有。'
                }
            };

            function setLanguage(lang) {
                // 1. update all data-i18n elements
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[lang] && translations[lang][key]) {
                        el.textContent = translations[lang][key];
                    }
                });

                // 2. update specific ID elements
                document.getElementById('companyNameEn').textContent = translations[lang].companyNameEn;
                document.getElementById('companyNameAr').textContent = translations[lang].companyNameAr;

                // 3. set dir attribute for all elements that now contain Arabic text
                const arabicElements = [
                    ...document.querySelectorAll('[data-i18n]'),
                    document.getElementById('companyNameAr')
                    // galleryTitleAr is already covered by data-i18n
                ];
                arabicElements.forEach(el => {
                    if (lang === 'ar') {
                        el.setAttribute('dir', 'rtl');
                        el.setAttribute('data-dir', 'rtl');   // keep both for compatibility
                    } else {
                        el.setAttribute('dir', 'ltr');
                        el.setAttribute('data-dir', 'ltr');
                    }
                });

                // 4. set html lang
                document.documentElement.lang = lang;

                // 5. toggle active class on language buttons
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.lang === lang);
                });

                // 6. update all .html links to preserve lang parameter
                document.querySelectorAll('a[href*=".html"]').forEach(link => {
                    const originalHref = link.getAttribute('href');
                    if (originalHref && !originalHref.startsWith('http') && !originalHref.startsWith('#')) {
                        link.setAttribute('href', addOrUpdateQueryParam(originalHref, 'lang', lang));
                    }
                });

                // 7. override language button clicks to navigate with new lang
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        e.preventDefault();
                        const newLang = btn.dataset.lang;
                        const currentUrl = window.location.pathname + window.location.search;
                        window.location.href = addOrUpdateQueryParam(currentUrl, 'lang', newLang);
                    };
                });
            }

            setLanguage(initialLang);
        })();
    </script>
</body>

</html>
